<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Sign in</h2>
    <p class="join">New to LinkedIn? <a href="#">Join now</a></p>

    <button class="btn google">Continue with Google</button>
    <button class="btn apple">Sign in with Apple</button>

    <p class="agreement">
      By continuing, you agree to LinkedIn’s 
      <a href="#">User Agreement</a>, 
      <a href="#">Privacy Policy</a>, and 
      <a href="#">Cookie Policy</a>.
    </p>

    <form>
      <label>Email or phone</label>
      <input type="text" placeholder="Enter email or phone">

      <label>Password</label>
      <div class="password-field">
        <input type="password" placeholder="Enter password">
        <span class="toggle">👁</span>
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <div class="keep-signed">
        <input type="checkbox" id="keep">
        <label for="keep">Keep me signed in</label>
      </div>

      <button type="submit" class="btn signin">Sign in</button>
    </form>

    <footer>
      <a href="#">User Agreement</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Community Guidelines</a>
      <a href="#">Cookie Policy</a>
      <a href="#">Copyright Policy</a>
      <a href="#">Send Feedback</a>
      <a href="#">Language</a>
    </footer>
  </div>
</body>
</html>
